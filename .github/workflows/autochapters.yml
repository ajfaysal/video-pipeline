name: AutoChapters

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Video URL to chapterize (leave blank if using a local input path)"
        required: false
        default: ""
      input_path:
        description: "Local repo-relative path to a video file (leave blank if using video_url)"
        required: false
        default: ""
      whisper_model:
        description: "faster-whisper model size"
        required: false
        default: "medium"

jobs:
  chapterize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-autochapters-${{ hashFiles('requirements.txt') }}

      - name: Cache faster-whisper model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-whisper-models-v1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run AutoChapters
        run: |
          if [ -n "${{ github.event.inputs.video_url }}" ]; then
            python autochapters/main.py --url "${{ github.event.inputs.video_url }}" --whisper-model "${{ github.event.inputs.whisper_model }}" --output-dir ./output
          else
            python autochapters/main.py --input "${{ github.event.inputs.input_path }}" --whisper-model "${{ github.event.inputs.whisper_model }}" --output-dir ./output
          fi

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autochapters-output
          path: |
            output/*_chapters.mp4
            output/*_chapters.txt
            output/*_chapters.ffmetadata
          retention-days: 7