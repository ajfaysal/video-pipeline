name: LofiLoop

# Standalone manual render for the LofiLoop module. The Telegram bot path uses
# telegram-dispatch.yml instead; this workflow lets you render + upload directly
# from the Actions tab without going through the bot.

on:
  workflow_dispatch:
    inputs:
      video:
        description: "Short (~10s) looping video: direct URL or repo-relative path"
        required: true
        default: ""
      audio:
        description: "Long audio: public Google Drive link, direct URL, or repo-relative path"
        required: true
        default: ""
      hours:
        description: "Target video duration in hours (e.g. 2, 10, 24)"
        required: true
        default: "2"
      crf:
        description: "H.264 CRF quality (lower = better; 18 = visually lossless)"
        required: false
        default: "18"
      preset:
        description: "x264 preset (ultrafast..veryslow)"
        required: false
        default: "veryfast"
      noise:
        description: "Invisible per-frame noise strength (1 = microscopic)"
        required: false
        default: "1"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lofiloop-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run LofiLoop render
        run: |
          python lofiloop/main.py \
            --video "${{ github.event.inputs.video }}" \
            --audio "${{ github.event.inputs.audio }}" \
            --hours "${{ github.event.inputs.hours }}" \
            --crf "${{ github.event.inputs.crf }}" \
            --preset "${{ github.event.inputs.preset }}" \
            --noise "${{ github.event.inputs.noise }}" \
            --output-dir ./output

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lofiloop-output
          path: |
            output/*.mp4
            output/lofi_manifest.json
          retention-days: 7
