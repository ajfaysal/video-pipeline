name: AudioDuck

on:
  workflow_dispatch:
    inputs:
      video_input:
        description: "Repo-relative path or URL for the source video"
        required: true
      voiceover_input:
        description: "Repo-relative path or URL for the narration audio"
        required: true

jobs:
  duck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audioduck-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run AudioDuck
        run: |
          python audioduck/main.py \
            --video "${{ github.event.inputs.video_input }}" \
            --voiceover "${{ github.event.inputs.voiceover_input }}" \
            --output-dir ./output

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audioduck-output
          path: output/
          retention-days: 7
