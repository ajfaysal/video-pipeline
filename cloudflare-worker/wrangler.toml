name = "video-pipeline-telegram-bot"
main = "worker.js"
compatibility_date = "2024-11-01"

# Create with: wrangler kv namespace create BOT_STATE
# Then paste the returned id below.
kv_namespaces = [
  { binding = "BOT_STATE", id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID" }
]

# Secrets (do NOT put these here - set via `wrangler secret put <NAME>`):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_SECRET
#   GITHUB_TOKEN
#   GITHUB_REPO   (e.g. "yourname/video-pipeline")
