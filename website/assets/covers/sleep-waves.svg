<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Sleep Waves album cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1c"/>
      <stop offset="50%" stop-color="#121a32"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7B267" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F7B267" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- stars -->
  <circle cx="120" cy="100" r="1.5" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="250" cy="80" r="1" fill="#F8FAFC" opacity="0.5"/>
  <circle cx="400" cy="60" r="1.5" fill="#F8FAFC" opacity="0.6"/>
  <circle cx="550" cy="90" r="1" fill="#F8FAFC" opacity="0.4"/>
  <circle cx="680" cy="70" r="1.5" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="180" cy="180" r="1" fill="#7C5CFF" opacity="0.6"/>
  <circle cx="620" cy="150" r="1" fill="#7C5CFF" opacity="0.5"/>
  <circle cx="320" cy="120" r="1.2" fill="#F8FAFC" opacity="0.5"/>
  <!-- moon -->
  <circle cx="600" cy="200" r="50" fill="#F8FAFC" opacity="0.85"/>
  <circle cx="620" cy="185" r="42" fill="#0a0e1c"/>
  <!-- waves -->
  <path d="M0,400 Q100,360 200,400 T400,400 T600,400 T800,400 V800 H0 Z" fill="url(#wave1)"/>
  <path d="M0,480 Q100,440 200,480 T400,480 T600,480 T800,480 V800 H0 Z" fill="url(#wave2)"/>
  <path d="M0,560 Q100,520 200,560 T400,560 T600,560 T800,560 V800 H0 Z" fill="#7C5CFF" opacity="0.12"/>
  <path d="M0,640 Q100,610 200,640 T400,640 T600,640 T800,640 V800 H0 Z" fill="#141A2E" opacity="0.8"/>
  <text x="400" y="320" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, serif" font-size="42" letter-spacing="8">SLEEP WAVES</text>
  <text x="400" y="360" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="16" letter-spacing="6">LOFIMELLOWHQ</text>
</svg>
