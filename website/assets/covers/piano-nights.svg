<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Piano Nights album cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120f28"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="keyW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="keyB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2448"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="violet" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#violet)"/>
  <!-- piano keys -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="75" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="150" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="225" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="300" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="375" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="450" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <rect x="525" y="0" width="70" height="280" rx="4" fill="url(#keyW)"/>
    <!-- black keys -->
    <rect x="50" y="0" width="42" height="170" rx="3" fill="url(#keyB)"/>
    <rect x="125" y="0" width="42" height="170" rx="3" fill="url(#keyB)"/>
    <rect x="275" y="0" width="42" height="170" rx="3" fill="url(#keyB)"/>
    <rect x="350" y="0" width="42" height="170" rx="3" fill="url(#keyB)"/>
    <rect x="425" y="0" width="42" height="170" rx="3" fill="url(#keyB)"/>
    <rect x="575" y="0" width="20" height="170" rx="3" fill="url(#keyB)" opacity="0"/>
  </g>
  <circle cx="400" cy="200" r="60" fill="none" stroke="#F7B267" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="400" cy="200" r="40" fill="none" stroke="#7C5CFF" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="400" y="680" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, serif" font-size="42" letter-spacing="8">PIANO NIGHTS</text>
  <text x="400" y="720" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="16" letter-spacing="6">LOFIMELLOWHQ</text>
</svg>
