<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Study Session album cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="50%" stop-color="#141A2E"/>
      <stop offset="100%" stop-color="#1e1535"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7B267" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F7B267" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="desk" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#F7B267" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#desk)"/>
  <!-- window -->
  <rect x="180" y="140" width="440" height="320" rx="8" fill="#0a0f1c" stroke="#7C5CFF" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="400" y1="140" x2="400" y2="460" stroke="#7C5CFF" stroke-opacity="0.3"/>
  <line x1="180" y1="300" x2="620" y2="300" stroke="#7C5CFF" stroke-opacity="0.3"/>
  <!-- city glow -->
  <rect x="220" y="340" width="40" height="80" fill="#7C5CFF" opacity="0.25"/>
  <rect x="280" y="300" width="30" height="120" fill="#7C5CFF" opacity="0.2"/>
  <rect x="340" y="320" width="35" height="100" fill="#F7B267" opacity="0.15"/>
  <rect x="450" y="310" width="45" height="110" fill="#7C5CFF" opacity="0.22"/>
  <rect x="520" y="290" width="28" height="130" fill="#F7B267" opacity="0.12"/>
  <rect x="560" y="330" width="38" height="90" fill="#7C5CFF" opacity="0.18"/>
  <!-- desk lamp light -->
  <polygon points="400,200 280,460 520,460" fill="url(#lamp)" opacity="0.35"/>
  <circle cx="400" cy="200" r="18" fill="#F7B267" opacity="0.85"/>
  <!-- books -->
  <rect x="250" y="500" width="90" height="12" rx="2" fill="#7C5CFF" opacity="0.6"/>
  <rect x="255" y="514" width="80" height="12" rx="2" fill="#F7B267" opacity="0.5"/>
  <rect x="248" y="528" width="95" height="12" rx="2" fill="#94A3B8" opacity="0.4"/>
  <text x="400" y="680" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, serif" font-size="42" letter-spacing="6">STUDY SESSION</text>
  <text x="400" y="720" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="16" letter-spacing="6">LOFIMELLOWHQ</text>
</svg>
