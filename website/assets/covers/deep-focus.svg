<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Deep Focus album cover">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#5a42c7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0B1020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#core)"/>
  <!-- concentric rings -->
  <circle cx="400" cy="360" r="200" fill="none" stroke="#7C5CFF" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="150" fill="none" stroke="#7C5CFF" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="100" fill="none" stroke="#F7B267" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="50" fill="none" stroke="#F8FAFC" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="12" fill="#F7B267" opacity="0.9"/>
  <!-- dots around -->
  <circle cx="400" cy="160" r="4" fill="#7C5CFF" opacity="0.6"/>
  <circle cx="560" cy="280" r="3" fill="#F7B267" opacity="0.5"/>
  <circle cx="240" cy="280" r="3" fill="#F7B267" opacity="0.5"/>
  <circle cx="520" cy="480" r="4" fill="#7C5CFF" opacity="0.5"/>
  <circle cx="280" cy="480" r="4" fill="#7C5CFF" opacity="0.5"/>
  <text x="400" y="680" text-anchor="middle" fill="#F8FAFC" font-family="Georgia, serif" font-size="42" letter-spacing="8">DEEP FOCUS</text>
  <text x="400" y="720" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="16" letter-spacing="6">LOFIMELLOWHQ</text>
</svg>
